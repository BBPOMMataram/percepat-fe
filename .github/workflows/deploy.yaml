name: Deploy Next.js

on:
  push:
    branches: ["main"]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      # checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # setup node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "npm"

      # cache build next
      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-next-

      # install dependency
      - name: Install dependencies
        run: npm ci

      # build next
      - name: Build project
        run: npm run build
        env:
          NEXT_PUBLIC_BACKEND_URL_PERCEPAT: ${{ secrets.NEXT_PUBLIC_BACKEND_URL_PERCEPAT }}
          NEXT_PUBLIC_BACKEND_URL_AUTH: ${{ secrets.NEXT_PUBLIC_BACKEND_URL_AUTH }}
          NEXT_PUBLIC_BACKEND_URL_SIAP_MELAYANI: ${{ secrets.NEXT_PUBLIC_BACKEND_URL_SIAP_MELAYANI }}
          NEXT_PUBLIC_BACKEND_URL_SIMPEL_BMN: ${{ secrets.NEXT_PUBLIC_BACKEND_URL_SIMPEL_BMN }}
          NEXT_PUBLIC_BACKEND_URL_BEST_EMPLOYEE: ${{ secrets.NEXT_PUBLIC_BACKEND_URL_BEST_EMPLOYEE }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ secrets.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}

      # upload build ke server
      - name: Upload build to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 56710
          source: ".next,public,package.json,package-lock.json,ecosystem.config.js"
          target: "/home/bbpommataram.id/PERCEPAT"

      # install prod dependency + restart
      - name: Restart PM2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: 56710
          script: |
            set -e

            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            nvm use 22

            cd /home/bbpommataram.id/PERCEPAT

            npm ci --omit=dev

            pm2 startOrRestart ecosystem.config.js
